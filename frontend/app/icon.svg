<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Slide background -->
  <rect x="2" y="5" width="28" height="20" rx="2" fill="#1E3A5F"/>
  <!-- Accent bar at top of slide -->
  <rect x="2" y="5" width="28" height="2.5" rx="1" fill="#4A90D9"/>
  <!-- Title line -->
  <rect x="5.5" y="10" width="14" height="2" rx="1" fill="#fff"/>
  <!-- Bullet lines -->
  <rect x="5.5" y="14.5" width="10" height="1.2" rx="0.6" fill="#fff" opacity="0.6"/>
  <rect x="5.5" y="17.5" width="12" height="1.2" rx="0.6" fill="#fff" opacity="0.6"/>
  <rect x="5.5" y="20.5" width="9" height="1.2" rx="0.6" fill="#fff" opacity="0.6"/>
  <!-- Figure placeholder -->
  <rect x="21" y="11" width="7" height="9" rx="1" fill="#4A90D9" opacity="0.5"/>
  <!-- Bottom bar / podium -->
  <rect x="8" y="27" width="16" height="2" rx="1" fill="#1E3A5F"/>
  <rect x="14.5" y="25" width="3" height="2" fill="#1E3A5F"/>
</svg>
